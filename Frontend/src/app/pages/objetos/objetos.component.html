<div class="container">

  <h2 class="titulo">Listado de Objetos</h2>

  <!-- TABLA -->
  <div class="tabla-container">
    <table class="tabla">
      <thead>
        <tr>
          <th>Título</th>
          <th>Descripción</th>
          <th>Lugar</th>
          <th>Fecha</th>
          <th>Estado</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let obj of objetos">
          <td>{{ obj.titulo }}</td>
          <td>{{ obj.descripcion }}</td>
          <td>{{ obj.lugar }}</td>
          <td>{{ obj.fechaEvento | date:'shortDate' }}</td>
          <td>
            <span class="estado">
              {{ obj.estado?.nombre || 'N/A' }}
            </span>
          </td>
        </tr>

        <tr *ngIf="objetos.length === 0">
          <td colspan="5" class="empty">
            No hay objetos registrados
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
